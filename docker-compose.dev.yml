services:
  mysql:
    image: mysql:8.4
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-insertq_dev}
      MYSQL_DATABASE: ${MYSQL_DB:-insertq_db}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
      - ./insertq_db.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_dev_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: always
    ports:
      - "5500:5500"
    env_file:
      - .env
    environment:
      - FLASK_ENV=development
      - MYSQL_HOST=mysql
      - REDIS_URL=redis://redis:6379/0
      - CACHE_REDIS_URL=redis://redis:6379/1
      - SESSION_REDIS_URL=redis://redis:6379/2
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - TEMPLATES_AUTO_RELOAD=true
      - GUNICORN_PRELOAD_APP=false
      - GUNICORN_LOG_LEVEL=debug
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./config:/app/config
      - ./blast_db:/app/blast_db
      - ./logs:/app/logs
      - upload_dev_data:/app/app/static/uploads

  celery_worker:
    build: .
    restart: always
    command: celery -A celery_worker.celery worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      - FLASK_ENV=development
      - MYSQL_HOST=mysql
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./config:/app/config
      - ./blast_db:/app/blast_db

volumes:
  mysql_dev_data:
  redis_dev_data:
  upload_dev_data:
