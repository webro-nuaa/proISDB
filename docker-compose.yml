services:
  mysql:
    image: mysql:8.4
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      # - ./proisdb_db.sql:/docker-entrypoint-initdb.d/01_schema.sql  # uncomment to restore from dump
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  web:
    build:
      context: .
      args:
        USE_CHINA_MIRROR: ${USE_CHINA_MIRROR:-false}
    image: proisdb-web:latest
    restart: always
    ports:
      - "80:5500"
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
      - FLASK_APP=run.py
      - MYSQL_HOST=mysql
      - REDIS_URL=redis://redis:6379/0
      - CACHE_REDIS_URL=redis://redis:6379/1
      - SESSION_REDIS_URL=redis://redis:6379/2
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - GUNICORN_WORKERS=4
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./blast_db:/app/blast_db
      - ./logs:/app/logs
      - upload_data:/app/app/static/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5500/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  celery_worker:
    build:
      context: .
      args:
        USE_CHINA_MIRROR: ${USE_CHINA_MIRROR:-false}
    image: proisdb-web:latest
    restart: always
    command: celery -A celery_worker.celery worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
      - FLASK_APP=run.py
      - MYSQL_HOST=mysql
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./blast_db:/app/blast_db
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  mysql_data:
  redis_data:
  upload_data:
