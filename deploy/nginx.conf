# proISDB Nginx reverse proxy configuration.
# Place at /etc/nginx/sites-available/proisdb and symlink to sites-enabled.
# Static files are proxied through Flask; for production high-traffic,
# uncomment the /static/ and /uploads/ blocks and adjust the alias to your
# host path (e.g. /opt/proisdb/app/app/static/).

upstream proisdb_app {
    server 127.0.0.1:5500 fail_timeout=0;
}

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20M;

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://proisdb_app;
        proxy_redirect off;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_read_timeout 120s;
    }

    location /blast/result/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://proisdb_app;
        proxy_read_timeout 180s;
    }

    access_log /var/log/nginx/proisdb_access.log;
    error_log /var/log/nginx/proisdb_error.log;
}
