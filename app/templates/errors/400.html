{% extends "layout/base.html" %}

{% block title %}400 - Bad Request{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="error-page">
                <h1 class="display-1 text-danger">400</h1>
                <h2 class="mb-4">Bad Request</h2>
                <p>Sorry, your request is invalid or malformed.</p>
                <div class="d-flex justify-content-center gap-3">
                    <a class="btn btn-primary" href="{{ url_for('main.index') }}"><i class="fas fa-home me-2"></i>Back to Home</a>
                    <a class="btn btn-outline-secondary" href="javascript:history.back();"><i class="fas fa-arrow-left me-2"></i>Go Back</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
